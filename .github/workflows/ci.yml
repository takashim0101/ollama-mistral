name: CI - Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Lint with flake8
      run: |
        flake8 api_server.py --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 api_server.py --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Ollama Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: false
        tags: ollama:test

    - name: Build API Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.api
        push: false
        tags: ollama-api:test

  test:
    runs-on: ubuntu-latest
    needs: [build, lint] # Ensure build and lint pass before testing
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and run services
      run: |
        docker compose -f docker-compose.yml up -d --build ollama api-server
        docker compose -f docker-compose.yml ps

    - name: Wait for API server to be healthy
      run: |
        # Wait for the API server to be ready
        for i in $(seq 1 30); do
          if curl --fail http://localhost:8000/health; then
            echo "API server is healthy."
            break
          fi
          echo "Waiting for API server... ($i/30)"
          sleep 5
        done

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-api.txt # Install all dependencies including pytest

    - name: Run pytest tests
      run: |
        pytest tests/


