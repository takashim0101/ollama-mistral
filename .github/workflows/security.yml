name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 0 * * 0'  # Weekly scan on Sunday

permissions:
  contents: read
  security-events: write  # Required for SARIF upload to GitHub Security

jobs:
  dependency-check:
    name: Scan Python Dependencies
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies for scanning
      run: |
        python -m pip install --upgrade pip
        pip install safety pip-audit

    - name: Check for known vulnerabilities with Safety
      run: |
        echo "Checking dependencies with Safety..."
        safety check --json > safety-report.json || SAFETY_EXIT=$?
        cat safety-report.json
        if [ ! -z "$SAFETY_EXIT" ] && [ "$SAFETY_EXIT" -ne 0 ]; then
          echo "❌ Safety found vulnerabilities!"
          exit 1
        fi
        echo "✓ No known vulnerabilities found"

    - name: Check for vulnerabilities with pip-audit
      run: |
        echo "Checking dependencies with pip-audit..."
        # Temporarily ignoring CVE-2026-3219 as the upstream pip upgrade does not resolve it yet.
        # TODO: Remove --ignore-vuln once a fully patched pip version is available in the runner environment.
        pip-audit --desc --ignore-vuln CVE-2026-3219 || PIP_AUDIT_EXIT=$?
        if [ ! -z "$PIP_AUDIT_EXIT" ] && [ "$PIP_AUDIT_EXIT" -ne 0 ]; then
          echo "❌ pip-audit found vulnerabilities!"
          exit 1
        fi
        echo "✓ pip-audit scan completed"

  container-scan:
    name: Scan Container Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build API Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.api
        push: false
        load: true
        tags: ollama-api:scan

    - name: Run Trivy scan on Docker image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'ollama-api:scan'
        format: 'sarif'
        output: 'trivy-image-results.sarif'
        severity: 'CRITICAL,HIGH'

    - name: Run Trivy scan on filesystem
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-fs-results.sarif'
        severity: 'CRITICAL,HIGH'

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-image-results.sarif,trivy-fs-results.sarif'
        category: 'trivy'

  secret-detection:
    name: Detect Secrets
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run TruffleHog for secret detection
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.repository.default_branch || 'main' }}
        head: HEAD
        extra_args: --only-verified --fail

  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 bandit

    - name: Run flake8 linting
      run: |
        echo "Running flake8..."
        flake8 api_server.py --count --show-source --statistics
        flake8 tests/ --count --show-source --statistics

    - name: Run Bandit security linter
      run: |
        echo "Running Bandit for security issues..."
        bandit -r api_server.py tests/ -f json -o bandit-report.json || true
        cat bandit-report.json

  sca:
    name: Software Composition Analysis
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Run Snyk dependency check
      uses: snyk/actions/python-3.12@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN || 'not-configured' }}
      continue-on-error: true
      with:
        args: --file=requirements-api.txt
