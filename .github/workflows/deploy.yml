name: Production Deployment with Approval

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      version:
        description: 'Version to deploy (tag or branch)'
        required: true
        default: 'main'

permissions:
  contents: read
  deployments: write
  id-token: write

jobs:
  pre-deployment-checks:
    name: Pre-Deployment Security Checks
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.version }}

    - name: Verify signed commits
      run: |
        echo "Checking commit signatures..."
        git log -1 --pretty=format:"%H %G?" | grep -q "G" || {
          echo "⚠️  Warning: Commit is not signed (recommended for production)"
        }
        echo "✓ Commit verification completed"

    - name: Verify all tests passed
      run: |
        echo "Checking CI status for ${{ github.event.inputs.version }}..."
        # Note: This would require GitHub API call to verify CI passed
        echo "✓ CI status check placeholder"

    - name: Check for security vulnerabilities
      run: |
        echo "Running pre-deployment security scan..."
        python -m pip install --upgrade pip
        pip install safety
        safety check || true
        echo "✓ Security check completed"

  approval:
    name: Request Production Approval
    runs-on: ubuntu-latest
    needs: pre-deployment-checks
    if: github.event.inputs.environment == 'production'
    environment:
      name: production-approval
      reviewers:
        - takashim0101
    steps:
    - name: Approval requested
      run: |
        echo "🔐 Production deployment requires manual approval"
        echo "Environment: ${{ github.event.inputs.environment }}"
        echo "Version: ${{ github.event.inputs.version }}"
        echo ""
        echo "Review the deployment in Actions > Environments > production-approval"

  deploy:
    name: Deploy to ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    needs: [pre-deployment-checks, approval]
    if: |
      always() &&
      needs.pre-deployment-checks.result == 'success' &&
      (github.event.inputs.environment == 'staging' || 
       (github.event.inputs.environment == 'production' && needs.approval.result == 'success'))
    environment:
      name: ${{ github.event.inputs.environment }}
      url: ${{ steps.deployment.outputs.url }}
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.version }}

    - name: Create deployment record
      id: deployment
      run: |
        DEPLOY_URL="https://github.com/${{ github.repository }}/deployments"
        echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
        echo "Deployment URL: $DEPLOY_URL"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      continue-on-error: true

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ghcr.io/${{ github.repository }}/api-server
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=sha

    - name: Build and push image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.api
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Deploy to ${{ github.event.inputs.environment }}
      env:
        DEPLOY_ENV: ${{ github.event.inputs.environment }}
        DEPLOY_VERSION: ${{ github.event.inputs.version }}
      run: |
        echo "🚀 Deploying to $DEPLOY_ENV ($DEPLOY_VERSION)"
        echo "Docker image: ${{ steps.meta.outputs.tags }}"
        echo ""
        echo "TODO: Connect to your deployment system"
        echo "- SSH to production server"
        echo "- Pull new Docker image"
        echo "- Run docker compose up"
        echo "- Verify health checks"

    - name: Send deployment notification
      if: success()
      run: |
        echo "✅ Deployment successful!"
        echo "Environment: ${{ github.event.inputs.environment }}"
        echo "Version: ${{ github.event.inputs.version }}"
        echo ""
        echo "Next steps:"
        echo "1. Verify application is running: curl http://target/health"
        echo "2. Check logs: docker logs <container>"
        echo "3. Run smoke tests"
        echo "4. Monitor for errors"

    - name: Rollback on failure
      if: failure()
      run: |
        echo "❌ Deployment failed - rolling back"
        echo "Environment: ${{ github.event.inputs.environment }}"
        echo "TODO: Implement rollback procedure"
