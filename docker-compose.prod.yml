services:
  ollama:
    build: .
    container_name: ollama-mistral-prod
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES}
      - OLLAMA_HOST=0.0.0.0
    ports:
      - "127.0.0.1:${OLLAMA_PORT}:11434"
    volumes:
      - ollama_data_prod:/root/.ollama
    restart: always
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s
    networks:
      - ollama-network-prod
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web-ui:
    image: ghcr.io/open-webui/open-webui:latest
    container_name: ollama-webui-prod
    ports:
      - "${WEBUI_PORT}:8080"
    environment:
      - OLLAMA_API_BASE_URL=http://ollama:11434/api
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
    volumes:
      - webui_data_prod:/app/backend/data
    depends_on:
      ollama:
        condition: service_healthy
    restart: always
    networks:
      - ollama-network-prod
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api-server:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ollama-api-prod
    ports:
      - "${API_PORT}:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - APP_ENV=${APP_ENV}
    depends_on:
      ollama:
        condition: service_healthy
    restart: always
    networks:
      - ollama-network-prod
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ollama_data_prod:
    driver: local
  webui_data_prod:
    driver: local

networks:
  ollama-network-prod:
    driver: bridge
